<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Spider-Verse Proposal</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;900&family=Bangers&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/proposal.css">
    <link rel="stylesheet" href="css/cursor.css">
</head>

<body>

    <!-- Animated Particles -->
    <div class="particles"></div>

    <!-- Ambient Multiverse Glows -->
    <div class="ambient ambient-1"></div>
    <div class="ambient ambient-2"></div>

    <!-- Main Proposal -->
    <div class="proposal-wrapper">

        <div class="proposal-box"
            id="proposalBox">

            <!-- Decorative Ring -->
            <div class="comic-ring"></div>

            <div class="inner-content">

                <h1 class="question cinematic-glitch"
                    id="question"
                    data-text="So.... will u be my gf ?">

                    So.... will u be my gf ?

                </h1>

                <div class="btn-group"
                    id="btnGroup">

                    <button class="btn yes-btn"
                        id="yesBtn">

                        Yes 💓

                    </button>

                    <button class="btn no-btn"
                        id="noBtn">

                        No way 😒

                    </button>

                </div>

            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script src="js/proposal.js"></script>
    <script src="js/cursor.js"></script>

</body>

</html>
