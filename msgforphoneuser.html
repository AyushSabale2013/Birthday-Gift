<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Access Restricted</title>

    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Montserrat:wght@300;500;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
                radial-gradient(circle at top, #1b1b1b 0%, #050505 70%);
            font-family: 'Montserrat', sans-serif;
            color: white;
            position: relative;
        }

        /* animated background glow */
        body::before {
            content: "";
            position: absolute;
            width: 600px;
            height: 600px;
            background: rgba(255, 0, 0, 0.12);
            border-radius: 50%;
            filter: blur(120px);
            animation: pulse 4s infinite alternate;
        }

        @keyframes pulse {
            from {
                transform: scale(0.9);
                opacity: 0.5;
            }

            to {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        /* web lines */
        .web {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(transparent 96%, rgba(255, 255, 255, 0.08) 100%),
                linear-gradient(90deg, transparent 96%, rgba(255, 255, 255, 0.08) 100%);
            background-size: 80px 80px;
            opacity: 0.3;
        }

        .container {
            width: 90%;
            max-width: 700px;
            text-align: center;
            z-index: 2;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            border-radius: 25px;
            box-shadow:
                0 0 30px rgba(255, 0, 0, 0.2),
                inset 0 0 20px rgba(255, 255, 255, 0.03);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        .spider {
            font-size: 5rem;
            margin-bottom: 10px;
            animation: swing 2s infinite ease-in-out;
            display: inline-block;
        }

        @keyframes swing {
            0% {
                transform: rotate(-6deg);
            }

            50% {
                transform: rotate(6deg);
            }

            100% {
                transform: rotate(-6deg);
            }
        }

        h1 {
            font-family: 'Bangers', cursive;
            font-size: 4rem;
            letter-spacing: 3px;
            color: #ff2b2b;
            text-shadow:
                0 0 10px rgba(255, 0, 0, 0.7),
                0 0 30px rgba(255, 0, 0, 0.4);
            margin-bottom: 20px;
        }

        .subtitle {
            font-size: 1.2rem;
            line-height: 1.8;
            color: #d7d7d7;
            margin-bottom: 35px;
        }

        .highlight {
            color: #ff4a4a;
            font-weight: 700;
        }

        .btn {
            display: inline-block;
            padding: 16px 38px;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            background: linear-gradient(135deg, #ff0000, #8b0000);
            box-shadow:
                0 0 15px rgba(255, 0, 0, 0.5);
            transition: 0.35s ease;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-4px) scale(1.04);
            box-shadow:
                0 0 25px rgba(255, 0, 0, 0.8);
        }

        .btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -120%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.25);
            transform: skewX(-25deg);
            transition: 0.5s;
        }

        .btn:hover::before {
            left: 120%;
        }

        .footer {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #8f8f8f;
            letter-spacing: 1px;
        }

        @media(max-width:768px) {

            h1 {
                font-size: 2.8rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .container {
                padding: 30px 20px;
            }

            .spider {
                font-size: 4rem;
            }
        }
    </style>
</head>

<body>

    <div class="web"></div>

    <div class="container">

        <div class="spider">🕷️</div>

        <h1>ACCESS DENIED</h1>

        <p class="subtitle">
            This universe was designed for the <span class="highlight">big-screen Spider-Verse experience.</span>
            <br><br>
            Mobile timelines are currently unstable ⚠️
            <br>
            Open this portal using a <span class="highlight">Laptop or PC</span> to continue the mission.
        </p>

        <div class="footer">
            — Friendly neighborhood developer 🕸️
        </div>

    </div>

</body>

</html>
